name: Collect Seoul Population Data

on:
  workflow_dispatch:

  schedule:
    - cron: "7 * * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
        run: python collect_once.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/seoul_population_log.csv
          git commit -m "Update Seoul population data" || echo "No changes"
          git pull --rebase
          git push
          
